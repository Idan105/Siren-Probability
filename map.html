  <style>
    :root {
      --bg-deep: #0a0c12;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;

    }
    header {
      display: flex;

      gap: 0.75rem;

    }
    header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-muted); }
    .header-links { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .header-dash-link, .header-map-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .header-dash-link:hover, .header-map-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }
    .header-map-link { border-color: rgba(0, 212, 170, 0.3); }
    .map-wrap {
      max-width: 640px;
      margin: 0 auto;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
    }
    #map { width: 100%; height: 420px; display: block; }
    .map-legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .map-legend span { display: flex; align-items: center; gap: 0.35rem; }
    .map-legend i { width: 12px; height: 12px; border-radius: 3px; }
    .map-status {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    .leaflet-control-attribution a { color: var(--text-muted) !important; }
    .prob-circle-wrap { background: none !important; border: none !important; }
    .prob-circle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(10, 12, 18, 0.92);
      border: 2px solid #6b9a76;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
    }
    .page-layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 1rem;
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    .main-content { flex: 0 1 auto; min-width: 0; }
    .ad-slot-left, .ad-slot-right {
      flex: 0 0 auto;
      width: 160px;
      min-height: 600px;

    .ad-slot-left .adsbygoogle, .ad-slot-right .adsbygoogle {

    .ad-slot-mobile {

    @media (max-width: 1023px) {

<body>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/d3-delaunay@6.0.2/dist/d3-delaunay.min.js" crossorigin=""></script>
  <script src="https://unpkg.com/polygon-clipping@0.15.6/dist/polygon-clipping.umd.js" crossorigin=""></script>
  <script>
    (function () {
      const OREF_JSON_DATA_PATH = 'data';
      let regionsLayer = null;
      let circlesLayer = null;

      // Same 7 regions as main page and server (alarm assignment = nearest region center)
      const REGIONS = [
        { id: 'center', name: 'Center (Gush Dan)', lat: 32.0853, lon: 34.7818 },
        { id: 'jerusalem', name: 'Jerusalem', lat: 31.7683, lon: 35.2137 },
        { id: 'north', name: 'North (Haifa area)', lat: 32.794, lon: 34.9896 },
        { id: 'south', name: 'South (Negev)', lat: 31.2518, lon: 34.7913 },
        { id: 'ashkelon', name: 'Ashkelon area', lat: 31.6697, lon: 34.5716 },
        { id: 'eilat', name: 'Eilat', lat: 29.5577, lon: 34.9519 },
        { id: 'galil', name: 'North East (Galil)', lat: 32.7957, lon: 35.531 }
      ];

      // Projection: equal-distance space at Israel's latitude so Voronoi "nearest" is accurate.
      var CENTER_LAT_RAD = (32 * Math.PI) / 180;
      var COS_LAT = Math.cos(CENTER_LAT_RAD);
      function projectLonLat(lon, lat) { return [lon * COS_LAT, lat]; }
      function unprojectXY(x, y) { return [x / COS_LAT, y]; }

      // Collect polygon(s) from a GeoJSON feature (Polygon = 1, MultiPolygon = many) for clipping.
      function getPolygonsFromFeature(feature) {
        var geom = feature && feature.geometry;
        if (!geom || !geom.coordinates) return [];
        if (geom.type === 'Polygon') return [geom.coordinates];
        if (geom.type === 'MultiPolygon') return geom.coordinates;
        return [];
      }

      // Voronoi cells in projected space, clipped to Israel (districts) + West Bank. Uses polygon-clipping lib.
      function voronoiGeoJSON(districtsFC, westBankFC) {
        var DelaunayLib = (typeof d3 !== 'undefined' && d3.Delaunay) ? d3.Delaunay : (typeof Delaunay !== 'undefined' ? Delaunay : null);
        if (!DelaunayLib) throw new Error('Delaunay not loaded');
        var clip = (typeof polygonClipping !== 'undefined' && polygonClipping && polygonClipping.intersection) || null;
        var clipSources = [];
        var dFeatures = (districtsFC && districtsFC.features) || [];
        for (var di = 0; di < dFeatures.length; di++) clipSources.push(dFeatures[di]);
        var wbFeatures = (westBankFC && westBankFC.features) || [];
        for (var wi = 0; wi < wbFeatures.length; wi++) clipSources.push(wbFeatures[wi]);
        var b = [34.2, 29.4, 35.9, 33.4];
        var points = REGIONS.map(function (r) { return projectLonLat(r.lon, r.lat); });
        var boundsProj = [
          projectLonLat(b[0], b[1])[0], projectLonLat(b[0], b[1])[1],
          projectLonLat(b[2], b[3])[0], projectLonLat(b[2], b[3])[1]
        ];
        var delaunay = DelaunayLib.from(points);
        var voronoi = delaunay.voronoi(boundsProj);
        var out = [];
        for (var i = 0; i < REGIONS.length; i++) {
          var poly = voronoi.cellPolygon(i);
          var ring = Array.from(poly || [], function (p) { return unprojectXY(p[0], p[1]); });
          if (ring.length < 3) continue;
          if (ring[0][0] !== ring[ring.length - 1][0] || ring[0][1] !== ring[ring.length - 1][1]) ring.push([ring[0][0], ring[0][1]]);
          var cellPoly = [ring];
          var added = false;
          if (clip && clipSources.length > 0) {
            for (var s = 0; s < clipSources.length; s++) {
              var polygons = getPolygonsFromFeature(clipSources[s]);
              for (var p = 0; p < polygons.length; p++) {
                var districtPoly = polygons[p];
                if (!districtPoly) continue;
                try {
                  var result = clip(cellPoly, districtPoly);
                  if (!result || result.length === 0) continue;
                  for (var r = 0; r < result.length; r++) {
                    var coords = result[r];
                    if (coords && coords[0] && coords[0].length >= 3) {
                      out.push({
                        type: 'Feature',
                        properties: { region_id: REGIONS[i].id, name: REGIONS[i].name },
                        geometry: { type: 'Polygon', coordinates: coords }
                      });
                      added = true;
                    }
                  }
                } catch (e) { /* skip */ }
              }
            }
          }
          if (!added) {
            out.push({
              type: 'Feature',
              properties: { region_id: REGIONS[i].id, name: REGIONS[i].name },
              geometry: { type: 'Polygon', coordinates: [ring] }
            });
          }
        }
        return { type: 'FeatureCollection', features: out };
      }

      function probabilityToColor(p) {
        if (p == null || isNaN(p)) return '#6b9a76';
        p = Math.max(0, Math.min(100, p));
        if (p <= 33) {
          const t = p / 33;
          return 'rgb(' + Math.round(0 + t * 0) + ',' + Math.round(212 + t * (158 - 212)) + ',' + Math.round(170 + t * (11 - 170)) + ')';
        }
        if (p <= 66) {
          const t = (p - 33) / 33;
          return 'rgb(' + Math.round(245 + t * (239 - 245)) + ',' + Math.round(158 + t * (68 - 158)) + ',' + Math.round(11 + t * (68 - 11)) + ')';
        }
        return 'rgb(239, 68, 68)';
      }

      function getFillColor(regions, regionId) {
        const d = regions && regions[regionId];
        const p = d && typeof d.probability === 'number' ? d.probability : null;
        return probabilityToColor(p);
      }

      function updateRegionStyles(regions) {
        if (!regionsLayer) return;
        regionsLayer.eachLayer(function (layer) {
          const rid = layer.feature && layer.feature.properties && layer.feature.properties.region_id;
          if (!rid) return;
          layer.setStyle({
            fillColor: getFillColor(regions, rid),
            color: '#e8ecf4',
            weight: 1.5,
            fillOpacity: 0.6
          });
        });
      }

      function createCircleIcon(regions, regionId) {
        const p = regions && regions[regionId] && typeof regions[regionId].probability === 'number'
          ? regions[regionId].probability
          : null;
        const label = p != null && !isNaN(p) ? Math.round(p) + '%' : '—';
        const borderColor = probabilityToColor(p);
        return L.divIcon({
          className: 'prob-circle-wrap',
          html: '<div class="prob-circle" style="border-color:' + borderColor + '">' + label + '</div>',
          iconSize: [36, 36],
          iconAnchor: [18, 18]
        });
      }

      function updateProbabilityCircles(map, regions) {
        if (!circlesLayer) return;
        circlesLayer.clearLayers();
        REGIONS.forEach(function (r) {
          const marker = L.marker([r.lat, r.lon], {
            icon: createCircleIcon(regions, r.id)
          });
          circlesLayer.addLayer(marker);
        });
      }

      function fetchUiData() {
        const base = (OREF_JSON_DATA_PATH || 'data').replace(/\/$/, '');
        return fetch(base + '/ui-data.json', { method: 'GET', cache: 'no-store' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .catch(function () { return null; });
      }

      function fetchWestBank() {
        return fetch('data/west-bank.geojson').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; })
          .then(function (data) {
            if (data && data.features && data.features.length > 0) return data;
            return fetch('https://cdn.jsdelivr.net/gh/sepans/palestine_geodata@master/palestine.geo.json').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; });
          });
      }

      function run() {
        const statusEl = document.getElementById('mapStatus');
        Promise.all([
          fetchUiData(),
          fetch('data/israel-districts.geojson').then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
          fetchWestBank()
        ]).then(function (results) {
          const uiData = results[0];
          const districtsFC = results[1];
          const westBankFC = results[2];
          const regions = uiData && uiData.regions && typeof uiData.regions === 'object' ? uiData.regions : null;
          const geojson = voronoiGeoJSON(districtsFC, westBankFC);

          const map = L.map('map').setView([31.5, 35.0], 7);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
          }).addTo(map);

          function styleForRegion(feature) {
            const rid = feature.properties && feature.properties.region_id;
            return {
              fillColor: getFillColor(regions, rid),
              color: '#e8ecf4',
              weight: 1.5,
              fillOpacity: 0.6
            };
          }

          regionsLayer = L.geoJSON(geojson, {
            style: styleForRegion
          }).addTo(map);

          circlesLayer = L.layerGroup().addTo(map);
          updateProbabilityCircles(map, regions);

          updateRegionStyles(regions);
          statusEl.textContent = regions ? 'Live probability by region.' : 'Run the local server to see live probability.';

          setInterval(function () {
            fetchUiData().then(function (data) {
              const r = data && data.regions ? data.regions : null;
              updateRegionStyles(r);
              updateProbabilityCircles(map, r);
            });
          }, 5000);
        }).catch(function (err) {
          statusEl.textContent = 'Could not load map or data: ' + (err && err.message ? err.message : 'unknown error');
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
      } else {
        run();
      }
    })();
  </script>
</body>
</html>
