# Fetches Pikud HaOref alerts and commits to this repo. Dashboard reads from same origin = no CORS, no request limit.
# Free on public repos (unlimited Actions minutes).

name: Fetch oref alerts

on:
  schedule:
    - cron: '* * * * *'     # every 1 minute (minimum for GitHub Actions)
  workflow_dispatch:        # run manually from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch oref and save
        run: |
          mkdir -p data
          node -e "
          const fs = require('fs');
          const opts = {
            headers: {
              'Accept': 'application/json',
              'Referer': 'https://www.oref.org.il/11226-he/pakar.aspx',
              'X-Requested-With': 'XMLHttpRequest',
              'User-Agent': 'Mozilla/5.0 (compatible; oref-fetch/1)'
            }
          };
          const HISTORY_DAYS = 30;
          const HISTORY_WINDOW_MS = HISTORY_DAYS * 24 * 60 * 60 * 1000;
          function decodeBody(buf) {
            const bytes = new Uint8Array(buf);
            if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE)
              return new TextDecoder('utf-16le').decode(buf.slice(2));
            return new TextDecoder('utf-8').decode(buf);
          }
          const t = Math.floor(Date.now()/1000);
          (async () => {
            try {
              let r = await fetch('https://www.oref.org.il/WarningMessages/alert/Alerts.json?t='+t, opts);
              console.log('Alerts.json status:', r.status, r.statusText);
              let b = await r.arrayBuffer();
              const s = decodeBody(b).trim();
              const alerts = s ? JSON.parse(s) : {};
              fs.writeFileSync('data/alerts.json', JSON.stringify(alerts), 'utf8');
              console.log('Alerts: got', typeof alerts === 'object' && alerts.data ? alerts.data.length : (Array.isArray(alerts) ? alerts.length : 0), 'items');
            } catch(e) {
              console.log('Alerts fetch error:', e.message);
              fs.writeFileSync('data/alerts.json', '{}', 'utf8');
            }
            try {
              let existing = [];
              if (fs.existsSync('data/history.json')) {
                try {
                  const raw = fs.readFileSync('data/history.json', 'utf8').trim();
                  if (raw) existing = JSON.parse(raw);
                  if (!Array.isArray(existing)) existing = [];
                } catch(_) {}
              }
              let r = await fetch('https://www.oref.org.il/WarningMessages/alert/History/AlertsHistory.json?t='+t, opts);
              console.log('History status:', r.status, r.statusText);
              let b = await r.arrayBuffer();
              const s = decodeBody(b).trim();
              const fresh = s ? JSON.parse(s) : [];
              const arr = Array.isArray(fresh) ? fresh : [];
              const seen = new Set();
              const cutoff = Date.now() - HISTORY_WINDOW_MS;
              const merged = [];
              for (const item of [...existing, ...arr]) {
                const id = (item.alertDate || item.datetime || item.date || '') + '|' + (item.data || item.city || '');
                if (seen.has(id)) continue;
                const ts = (item.alertDate || item.datetime) ? new Date(item.alertDate || item.datetime).getTime() : 0;
                if (ts && ts < cutoff) continue;
                seen.add(id);
                merged.push(item);
              }
              merged.sort((a,b) => new Date(b.alertDate || b.datetime || 0).getTime() - new Date(a.alertDate || a.datetime || 0).getTime());
              fs.writeFileSync('data/history.json', JSON.stringify(merged), 'utf8');
              console.log('History: merged', merged.length, 'items (last', HISTORY_DAYS, 'days)');
            } catch(e) {
              console.log('History fetch error:', e.message);
              if (!fs.existsSync('data/history.json')) fs.writeFileSync('data/history.json', '[]', 'utf8');
            }
          })();
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json data/history.json
          git diff --staged --quiet || git commit -m "oref: update alerts [skip ci]"
          git pull --rebase origin main
          git push origin main
